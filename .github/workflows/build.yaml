name: CI/CD
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  setup:
    permissions:
      contents: read
      pull-requests: read
    name: Setup
    runs-on: ubuntu-slim
    outputs:
      techdocs: >-
        ${{ steps.changes.outputs.techdocs == 'true' || steps.changes.outputs.workflows == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          list-files: json
          filters: .github/path-filters.yaml
      - name: Debug ...
        run: |
          echo ::${{ steps.changes.outputs }}

  techdocs:
    needs: setup
    if: needs.setup.outputs.techdocs == 'true'
    concurrency:
      group: ${{ github.repository }}-${{ github.workflow }}-techdocs-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write
      packages: read
      pull-requests: read
    uses: coopnorge/github-workflow-techdocs/.github/workflows/techdocs.yaml@v0

  build:
    needs:
      - techdocs
    if: failure() || cancelled()
    runs-on: ubuntu-slim
    permissions: {}
    steps:
      - run: exit 1
        name: "Catch errors"
