on:
  workflow_call:
    inputs:
      incoming_column:
        required: true
        type: string
        description: The name of the column you want a created issue to go to
      done_column:
        required: true
        type: string
        description: The name of the column you want a closed issue to go to
      project_id:
        required: true
        type: number
        description: The number of the project with the board you want to move issues to
    secrets:
      gh_app_secret_key:
        required: true

env:
  gh_app_installation_ID: 25206235
  gh_app_ID: 194396
  organization: coopnorge

jobs:
  issue_opened_or_reopened:
    name: issue_opened_or_reopened
    runs-on: ubuntu-24.04
    if: |
      github.event_name == 'issues' &&
      (github.event.action == 'opened' || github.event.action == 'reopened') &&
      !contains(fromJSON('["renovatebot-coopnorge[bot]", "renovate-coop-norge[bot]"]'), github.event.issue.user.login)
    permissions:
      issues: write
      contents: read
    steps:
      - name: Move issue to ${{ inputs.incoming_column }}
        uses: leonsteinhaeuser/project-beta-automations@939000fb1900c9fc4f7b5058a09d9f833ebc6859 # pin@v2.2.1
        env:
          DEBUG_COMMANDS: true
          DEBUG_LOG: true
        with:
          status_value: ${{ inputs.incoming_column }}
          organization: ${{ env.organization }}
          gh_app_secret_key: ${{ secrets.gh_app_secret_key }}
          gh_app_ID: ${{ env.gh_app_ID }}
          gh_app_installation_ID: ${{ env.gh_app_installation_ID }}
          project_id: ${{ inputs.project_id }}
          resource_node_id: ${{ github.event.issue.node_id }}
  issue_closed:
    name: issue_closed
    runs-on: ubuntu-24.04
    if: github.event_name == 'issues' && github.event.action == 'closed'
    permissions:
      issues: write
      contents: read
    steps:
      - name: Moved issue to ${{ inputs.done_column }}
        uses: leonsteinhaeuser/project-beta-automations@939000fb1900c9fc4f7b5058a09d9f833ebc6859 # pin@v2.2.1
        env:
          DEBUG_COMMANDS: true
          DEBUG_LOG: true
        with:
          status_value: ${{ inputs.done_column }}
          organization: ${{ env.organization }}
          gh_app_secret_key: ${{ secrets.gh_app_secret_key }}
          gh_app_ID: ${{ env.gh_app_ID }}
          gh_app_installation_ID: ${{ env.gh_app_installation_ID }}
          project_id: ${{ inputs.project_id }}
          resource_node_id: ${{ github.event.issue.node_id }}
