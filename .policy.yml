policy:
  approval:
  - or:
    - Dependency updates
    - Code change
approval_rules:
- name: Dependency updates
  if:
    only_has_contributors_in:
      users:
      - dependabot[bot]
      - renovate-coop-norge[bot]
    only_changed_files:
      paths:
      - ^\.github/workflows/.*$
    has_valid_signatures_by_keys:
      key_ids:
      - B5690EEEBB952194
  requires:
    count: 1
    teams:
    - coopnorge/engineering
    - coopnorge/github-review-bots
  options:
    invalidate_on_push: true
    methods:
      github_review: true
      comments: []
    request_review:
      enabled: true
      mode: random-users
      count: 2
- name: Code change
  if:
    changed_files:
      paths:
      - .*
  requires:
    count: 1
    teams:
    - coopnorge/engineering
  options:
    invalidate_on_push: true
    methods:
      github_review: true
      comments: []
    request_review:
      enabled: true
      mode: random-users
      count: 2
